server {
    listen 80;
    server_name _;
    root /var/www/legacy/public;
    index index.php;

    location = / {
        return 302 /legacy/;
    }

    location = /legacy {
        return 301 /legacy/;
    }

    location = /legacy/ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/legacy/public/index.php;
        fastcgi_pass php:9000;
    }

    location ~ ^/legacy/(.+\.php)$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/legacy/public/$1;
        fastcgi_pass php:9000;
    }

    location /legacy/ {
        return 404;
    }

    location /api/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://python-api:8000;
    }

    location /docs {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://python-api:8000;
    }

    location = /openapi.json {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://python-api:8000/openapi.json;
    }

    location = /health {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://python-api:8000/api/health;
    }
}
