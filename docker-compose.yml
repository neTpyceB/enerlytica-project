services:
  nginx:
    image: nginx:stable-alpine
    container_name: enerlytica-nginx
    depends_on:
      - php
      - python-api
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./legacy-php/public:/var/www/legacy/public:ro
    networks:
      - enerlytica-net

  php:
    build:
      context: ./legacy-php
      dockerfile: Dockerfile
    container_name: enerlytica-php
    expose:
      - "9000"
    depends_on:
      - python-api
    volumes:
      - ./legacy-php/public:/var/www/legacy/public:ro
      - ./legacy-php/src:/var/www/legacy/src:ro
    networks:
      - enerlytica-net

  python-api:
    build:
      context: ./python-service
      dockerfile: Dockerfile
    container_name: enerlytica-python-api
    expose:
      - "8000"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    volumes:
      - ./python-service:/app
    depends_on:
      - postgres
    networks:
      - enerlytica-net

  postgres:
    image: postgres:18-alpine
    container_name: enerlytica-postgres
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-enerlytica}"
      POSTGRES_USER: "${POSTGRES_USER:-enerlytica}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-enerlytica}"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-v18-data:/var/lib/postgresql
    networks:
      - enerlytica-net

networks:
  enerlytica-net:
    name: enerlytica-net

volumes:
  postgres-v18-data:
